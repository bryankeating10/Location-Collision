services:

  app:
    build: .
    container_name: location-collision-app
    volumes:
      - .:/app
    working_dir: /app
    command: pytest
    depends_on:
      - db
  
  db:
    image: postgres:16
    container_name: sunbird_db
    environment:
      POSTGRES_USER: sunbird
      POSTGRES_PASSWORD: sunbird
      POSTGRES_DB: sunbird_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: