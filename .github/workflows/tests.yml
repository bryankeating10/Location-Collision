name: Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      POSTGRES_USER: sunbird
      POSTGRES_PASSWORD: sunbird
      POSTGRES_DB: sunbird_db
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: sunbird
          POSTGRES_PASSWORD: sunbird
          POSTGRES_DB: sunbird_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U sunbird"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Wait for Postgres
        run: |
          until pg_isready -h localhost -p 5432 -U sunbird; do
            echo "Waiting for postgres..."
            sleep 2
          done

      - name: Run migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest