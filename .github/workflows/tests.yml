name: Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: sunbird
          POSTGRES_PASSWORD: sunbird
          POSTGRES_DB: sunbird_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U sunbird"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - run: alembic upgrade head

      - run: pytest