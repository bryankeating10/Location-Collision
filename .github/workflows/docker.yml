name: Docker Build

on:
  workflow_run:
    workflows: ["Tests"]
    types:
      - completed

jobs:
  docker:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t bryankeating10/location-collision:${{ github.sha }} .
          docker tag bryankeating10/location-collision:${{ github.sha }} bryankeating10/location-collision:latest

      - name: Push Docker image
        run: |
          docker push bryankeating10/location-collision:${{ github.sha }}
          docker push bryankeating10/location-collision:latest