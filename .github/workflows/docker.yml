name: CI

on:
  push:
    branches: [main]

jobs:

  test-and-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: sunbird
          POSTGRES_PASSWORD: sunbird
          POSTGRES_DB: sunbird_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U sunbird"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      POSTGRES_USER: sunbird
      POSTGRES_PASSWORD: sunbird
      POSTGRES_DB: sunbird_db
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run migrations
        run: |
          alembic upgrade head

      - name: Run tests
        run: |
          pytest

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image
        run: |
          docker build -t bryankeating10/location-collision:latest .

      - name: Push image
        run: |
          docker push bryankeating10/location-collision:latest